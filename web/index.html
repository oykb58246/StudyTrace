<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="StudyTrace - 大学生课程任务管理与 AI 学习周报生成 App">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="学迹">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>学迹 - StudyTrace</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    (function () {
      var appHost = "studytrace.oykb.cn";
      var boot = function () {
        var script = document.createElement("script");
        script.src = "flutter_bootstrap.js?v=" + Date.now();
        script.async = true;
        document.body.appendChild(script);
      };
      if (window.location.hostname !== appHost ||
          !("serviceWorker" in navigator)) {
        boot();
        return;
      }
      var resetKey = "studytrace_sw_reset_v3";
      var unregister = navigator.serviceWorker.getRegistrations()
        .then(function (registrations) {
          return Promise.all(registrations.map(function (registration) {
            return registration.unregister();
          }));
        });
      var clearCaches = "caches" in window
        ? caches.keys().then(function (keys) {
            return Promise.all(keys.map(function (key) {
              return caches.delete(key);
            }));
          })
        : Promise.resolve();
      Promise.all([unregister, clearCaches]).catch(function () {}).then(
        function () {
          if (navigator.serviceWorker.controller &&
              sessionStorage.getItem(resetKey) !== "1") {
            sessionStorage.setItem(resetKey, "1");
            window.location.reload();
            return;
          }
          boot();
        }
      );
    })();
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
</body>
</html>
