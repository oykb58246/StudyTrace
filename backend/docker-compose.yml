services:
  mysql:
    image: mysql:8.0
    container_name: studytrace-mysql
    environment:
      MYSQL_ROOT_PASSWORD: studytrace
      MYSQL_DATABASE: studytrace
      MYSQL_USER: studytrace
      MYSQL_PASSWORD: studytrace
    ports:
      - "3306:3306"
    volumes:
      - studytrace_mysql_data:/var/lib/mysql

  api:
    build: .
    container_name: studytrace-api
    depends_on:
      - mysql
    env_file:
      - .env
    ports:
      - "3000:3000"

volumes:
  studytrace_mysql_data:
